name = "attn-relay"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
BASE_HYPERSYNC_URL = "https://base.hypersync.xyz/query"

routes = [
  { pattern = "attn.s0nderlabs.xyz", custom_domain = true }
]

[durable_objects]
bindings = [
  { name = "AGENT_MAILBOX", class_name = "AgentMailbox" },
  { name = "GROUP_MAILBOX", class_name = "GroupMailbox" },
  { name = "NAME_INDEXER", class_name = "NameIndexer" }
]

[[r2_buckets]]
binding = "FILE_BUCKET"
bucket_name = "attn-files"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AgentMailbox"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["GroupMailbox"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["NameIndexer"]
